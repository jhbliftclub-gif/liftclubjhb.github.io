<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Orders Dashboard — Lift Club JHB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--s1:#111;--s2:#1a1a1a;--s3:#262626;--border:#2e2e2e;--muted:#666;--dim:#999;--text:#f0f0f0;--white:#fff;--r:10px;--rs:6px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
.wrap{max-width:820px;margin:0 auto;padding:24px 16px 60px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:0.04em;color:var(--white);margin-bottom:4px}
.subtitle{color:var(--muted);font-size:0.85rem;margin-bottom:24px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:0.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.field input,.field select{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;color:var(--text);font-size:0.95rem;font-family:inherit;outline:none}
.field input:focus,.field select:focus{border-color:var(--white)}
button{cursor:pointer;font-family:inherit;font-weight:700;border:none;border-radius:var(--rs);padding:13px 18px;font-size:0.9rem}
.btn-primary{background:var(--white);color:var(--bg);width:100%}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.msg{margin-top:14px;padding:11px 14px;border-radius:var(--rs);font-size:0.85rem;display:none}
.msg.show{display:block}
.msg.success{background:rgba(34,197,94,0.1);border:1px solid #22c55e;color:#4ade80}
.msg.error{background:rgba(239,68,68,0.1);border:1px solid #ef4444;color:#f87171}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:var(--white);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
#lockScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center}
#lockScreen .card{width:100%;max-width:340px;text-align:left}
#appScreen{display:none}

.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar input{flex:1;min-width:160px;background:var(--s1);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;color:var(--text);font-size:0.85rem;font-family:inherit;outline:none}
.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
.tab{flex-shrink:0;padding:8px 14px;border-radius:100px;font-size:0.78rem;font-weight:700;background:var(--s2);border:1px solid var(--border);color:var(--dim);cursor:pointer;white-space:nowrap}
.tab.active{background:var(--white);color:var(--bg);border-color:var(--white)}
.refresh-btn{background:var(--s2);border:1px solid var(--border);color:var(--dim);font-size:0.78rem;font-weight:600;padding:9px 14px;flex-shrink:0}

.order-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.order-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:10px}
.order-id{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:0.02em;color:var(--white)}
.order-dist{color:var(--muted);font-size:0.78rem}
.status-pill{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;padding:4px 10px;border-radius:100px;flex-shrink:0}
.status-Pending{background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.4)}
.status-Accepted{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.4)}
.status-Delivered{background:rgba(99,102,241,0.15);color:#a5b4fc;border:1px solid rgba(99,102,241,0.4)}
.status-Rejected{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.4)}
.order-name{font-weight:700;font-size:0.92rem;color:var(--white);margin-bottom:2px}
.order-addr{color:var(--dim);font-size:0.82rem;margin-bottom:2px}
.order-meta{color:var(--muted);font-size:0.76rem;margin-top:6px}
.order-driver{font-size:0.8rem;color:#4ade80;margin-top:8px}
.order-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.order-actions select,.order-actions button{flex:1;min-width:110px;font-size:0.78rem;padding:9px 10px;border-radius:var(--rs);font-weight:700;border:1px solid var(--border);background:var(--s2);color:var(--text)}
.order-actions .btn-deliver{background:var(--white);color:var(--bg);border-color:var(--white)}
.order-actions .btn-reject{background:rgba(239,68,68,0.1);color:#f87171;border-color:rgba(239,68,68,0.3)}
.empty-state{color:var(--muted);font-size:0.85rem;text-align:center;padding:40px 0}
</style>
</head>
<body>

<div class="wrap">
  <div class="logo">LIFT CLUB JHB</div>
  <div class="subtitle">Orders Dashboard</div>

  <!-- LOCK SCREEN -->
  <div id="lockScreen">
    <div class="card">
      <div class="field">
        <label>Admin Password</label>
        <input type="password" id="pwInput" placeholder="Enter admin password" autocomplete="off"/>
      </div>
      <button class="btn-primary" id="unlockBtn" onclick="unlock()">Unlock</button>
      <div class="msg" id="lockMsg"></div>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="appScreen">
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Search order ref or passenger name..." oninput="renderOrders()"/>
      <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
    </div>
    <div class="tabs" id="tabs"></div>
    <div id="ordersList"><div class="empty-state">Loading orders...</div></div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwPl9LbPp6cp9RSSJo_3LzaDk8qogBc43grfCdgbZzWbm7QBG9ZhGrAF7FficI3MHMZ/exec';
let adminPassword = '';
let allOrders = [];
let allDrivers = [];
let activeTab = 'All';
const TABS = ['All', 'Pending', 'Accepted', 'Delivered', 'Rejected'];

function unlock() {
  const pw = document.getElementById('pwInput').value.trim();
  const msg = document.getElementById('lockMsg');
  const btn = document.getElementById('unlockBtn');
  if (!pw) { msg.textContent = 'Please enter the password.'; msg.className = 'msg error show'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Checking...';

  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'listOrders', password: pw })
  })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        adminPassword = pw;
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('appScreen').style.display = 'block';
        allOrders = data.orders;
        allDrivers = data.drivers;
        renderTabs();
        renderOrders();
      } else {
        msg.textContent = data.error || 'Incorrect password.';
        msg.className = 'msg error show';
        btn.disabled = false;
        btn.textContent = 'Unlock';
      }
    })
    .catch(() => {
      msg.textContent = 'Network error. Please try again.';
      msg.className = 'msg error show';
      btn.disabled = false;
      btn.textContent = 'Unlock';
    });
}

function loadOrders() {
  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'listOrders', password: adminPassword })
  })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        allOrders = data.orders;
        allDrivers = data.drivers;
        renderOrders();
      }
    })
    .catch(err => console.error('Failed to load orders:', err));
}

function renderTabs() {
  const counts = {};
  TABS.forEach(t => counts[t] = t === 'All' ? allOrders.length : allOrders.filter(o => o.Status === t).length);
  document.getElementById('tabs').innerHTML = TABS.map(t =>
    `<div class="tab ${t === activeTab ? 'active' : ''}" onclick="setTab('${t}')">${t} (${counts[t]})</div>`
  ).join('');
}

function setTab(t) {
  activeTab = t;
  renderTabs();
  renderOrders();
}

function renderOrders() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = allOrders;
  if (activeTab !== 'All') filtered = filtered.filter(o => o.Status === activeTab);
  if (search) {
    filtered = filtered.filter(o =>
      (o.OrderID || '').toLowerCase().includes(search) ||
      (o.PassengerName || '').toLowerCase().includes(search)
    );
  }

  const list = document.getElementById('ordersList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state">No orders match this view.</div>';
    return;
  }

  const driverOptions = '<option value="">Assign driver...</option>' +
    allDrivers.map(d => `<option value="${escapeHtml(d.driverId)}">${escapeHtml(d.name)}</option>`).join('');

  list.innerHTML = filtered.map(o => {
    const assignedDriver = allDrivers.find(d => d.driverId === o.DriverID);
    return `
    <div class="order-card">
      <div class="order-top">
        <div>
          <div class="order-id">${escapeHtml(o.OrderID)}</div>
          <div class="order-dist">${o.DistanceKm ? o.DistanceKm + ' km' : ''}${o.Fare ? ' · R' + o.Fare : ''}</div>
        </div>
        <span class="status-pill status-${escapeHtml(o.Status)}">${escapeHtml(o.Status)}</span>
      </div>
      <div class="order-name">${escapeHtml(o.PassengerName || '')}</div>
      <div class="order-addr">From: ${escapeHtml(o.PickupAddress || '')}</div>
      <div class="order-addr">To: ${escapeHtml(o.DropoffAddress || '')}</div>
      <div class="order-meta">${escapeHtml(o.Frequency === 'Weekly' ? (o.SelectedDays || '') + ' · ' + (o.StartDate || '') + ' to ' + (o.EndDate || '') : (o.ScheduledDate || ''))} ${o.ScheduledTime ? '· ' + escapeHtml(o.ScheduledTime) : ''}</div>
      ${assignedDriver ? `<div class="order-driver">🚗 ${escapeHtml(assignedDriver.name)}</div>` : ''}
      <div class="order-actions">
        ${o.Status !== 'Delivered' && o.Status !== 'Rejected' ? `
          <select onchange="assignDriver('${o.OrderID}', this.value)">${driverOptions}</select>
        ` : ''}
        ${o.Status === 'Accepted' ? `<button class="btn-deliver" onclick="markDelivered('${o.OrderID}')">Mark Delivered</button>` : ''}
        ${o.Status === 'Pending' ? `<button class="btn-reject" onclick="setStatus('${o.OrderID}','Rejected')">Reject</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function assignDriver(orderId, driverId) {
  if (!driverId) return;
  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'adminAssignDriver', password: adminPassword, orderId: orderId, driverId: driverId })
  })
  .then(r => r.json())
  .then(data => { if (data.success) loadOrders(); else alert(data.error || 'Failed to assign driver.'); })
  .catch(() => alert('Network error. Please try again.'));
}

function markDelivered(orderId) {
  if (!confirm('Mark ' + orderId + ' as delivered?')) return;
  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'adminMarkDelivered', password: adminPassword, orderId: orderId })
  })
  .then(r => r.json())
  .then(data => { if (data.success) loadOrders(); else alert(data.error || 'Failed to update.'); })
  .catch(() => alert('Network error. Please try again.'));
}

function setStatus(orderId, status) {
  if (!confirm('Set ' + orderId + ' to ' + status + '?')) return;
  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'adminSetStatus', password: adminPassword, orderId: orderId, status: status })
  })
  .then(r => r.json())
  .then(data => { if (data.success) loadOrders(); else alert(data.error || 'Failed to update.'); })
  .catch(() => alert('Network error. Please try again.'));
}

function escapeHtml(str) {
  return (str || '').toString().replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
</script>
</body>
</html>
